<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
</head>
<body>
  <script>
    function createIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Brown background
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(0, 0, size, size);

      // White text "WS"
      ctx.fillStyle = '#ffffff';
      ctx.font = `bold ${Math.round(size * 0.5)}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('WS', size / 2, size / 2);

      return canvas.toDataURL('image/png');
    }

    // Generate all three sizes
    const sizes = [16, 48, 128];
    sizes.forEach(size => {
      const dataUrl = createIcon(size);
      console.log(`icon${size}.png:`, dataUrl);

      // Create download link
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `icon${size}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    document.body.innerHTML = '<p>Icons generated! Check your downloads folder.</p>';
  </script>
</body>
</html>
