<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Woolly Sloth — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f9f9f9;
      color: #222;
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    h2 {
      font-size: 16px;
      color: #555;
      margin-top: 24px;
      margin-bottom: 12px;
    }
    section {
      background: white;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #e0e0e0;
    }
    label {
      display: block;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    input[type="radio"] {
      margin-right: 8px;
    }
    input[type="password"],
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    textarea {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      resize: vertical;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #0052a3;
    }
    button.secondary {
      background: #666;
      margin-left: 8px;
    }
    button.secondary:hover {
      background: #444;
    }
    p {
      margin: 8px 0;
      font-size: 13px;
      color: #666;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    #saveStatus {
      margin-left: 12px;
      color: #66bb6a;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h1>Woolly Sloth Settings</h1>

  <section>
    <h2>AI Provider</h2>
    <label>
      <input type="radio" name="provider" value="gemini" checked>
      Gemini (gemini-2.5-flash) — Recommended (Free tier available)
    </label>
    <label>
      <input type="radio" name="provider" value="openai">
      OpenAI (gpt-4o-mini)
    </label>
  </section>

  <section>
    <h2>Gemini API Key</h2>
    <p>Get yours free at <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a></p>
    <input type="password" id="geminiKey" placeholder="AIza..." autocomplete="off">
  </section>

  <section>
    <h2>OpenAI API Key</h2>
    <p>Get yours at <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a></p>
    <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off">
  </section>

  <section>
    <h2>Memory Log</h2>
    <p>Feedback you submit after each reply is stored here and added to the AI prompt to improve future replies.</p>
    <textarea id="memoryPreview" rows="10" readonly></textarea>
    <button class="secondary" id="clearMemory">Clear Memory</button>
  </section>

  <button id="saveBtn">Save Settings</button>
  <span id="saveStatus"></span>

  <script src="options.js"></script>
</body>
</html>
