<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: #f9f9f9;
    }
    h3 {
      margin: 0 0 8px 0;
      color: #333;
      font-size: 15px;
    }
    p {
      margin: 0 0 12px 0;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }
    button {
      width: 100%;
      background: #0066cc;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #0052a3;
    }
  </style>
</head>
<body>
  <h3>Woolly Sloth</h3>
  <p>Highlight text anywhere, right-click, and select "Generate Lease Reply".</p>
  <button id="openOptions">Open Settings</button>
  <script src="popup.js"></script>
</body>
</html>
